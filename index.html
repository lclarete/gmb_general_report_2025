<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Em manutenção — Grupo Mulheres do Brasil</title>
  <style>
    :root{
      --navy:#0b2b4d;
      --teal:#2aa7b3;
      --text:#111;
      --muted:#5f6368;
      --border:#e6e6e6;
      --bg:#ffffff;
      --blockA: rgba(42,167,179,0.10);
      --blockBorderA: rgba(42,167,179,0.35);
    }

    *{ box-sizing: border-box; }

    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap{
      max-width: 620px;
      width: 100%;
      text-align: center;
    }

    .card{
      border: 1px solid var(--blockBorderA);
      background: var(--blockA);
      border-radius: 14px;
      padding: 40px 28px;
    }

    .logo{
      width: 240px;
      max-width: 70%;
      height: auto;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.06);
      margin-bottom: 28px;
    }

    .icon{
      font-size: 48px;
      margin-bottom: 12px;
    }

    h1{
      font-size: 30px;
      margin: 0 0 14px;
      color: var(--navy);
      letter-spacing: -0.3px;
      line-height: 1.25;
    }

    p{
      font-size: 16px;
      line-height: 1.65;
      color: var(--muted);
      margin: 0 0 12px;
    }

    .hint{
      margin-top: 22px;
      font-size: 14px;
      color: var(--muted);
    }

    a{
      color: var(--teal);
      text-decoration: none;
      font-weight: 650;
    }
    a:hover{ text-decoration: underline; }

    @media (max-width: 520px){
      h1{ font-size: 24px; }
      .card{ padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img
      class="logo"
      src="https://raw.githubusercontent.com/lclarete/gmb_general_report_2025/refs/heads/main/GMB_Logo.png"
      alt="Grupo Mulheres do Brasil"
    />
    <div class="card">
      <div class="icon">🛠️</div>
      <h1>Em manutenção</h1>
      <p>Esta página está temporariamente indisponível.</p>
      <p><strong>Por favor, tente novamente mais tarde.</strong></p>
      <div class="hint">
        Em caso de dúvidas, entre em contato pelo e-mail
        <a href="mailto:internacional@grupomulheresdobrasil.org.br">internacional@grupomulheresdobrasil.org.br</a>.
      </div>
    </div>
  </div>
</body>
</html>
